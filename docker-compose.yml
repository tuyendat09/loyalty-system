services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    image: react-app:latest
    container_name: react-app
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    # Optional: resource limits
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
